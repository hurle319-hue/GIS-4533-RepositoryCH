<!-- 
    Assignment 2: Modify a leaflet web map
    In this assignment you will start with a working web map, and then modify and add to it.

    Task:

    1. Replace the tile layer with a different one.
    hint: use the Leaflet Providers page to find one: https://leaflet-extras.github.io/leaflet-providers/preview/
    2. Add new markers to the map at three of your favorite locations around Duluth.
    - Each marker should have a popup that includes the name of the location and a fun fact about it.
    - At least one of the markers should have an image or video in the popup.
    - You can remove the existing marker for the UMD campus if you want.
    3. Center the map on Duluth (change the zoom level as well if you want).
    4. Modify the title and subtitle to reflect your name and the theme of your map.
    5. Add a paragraph to the paragraph describing your map and the locations you added.
    6. Modify the style of each of the elements (header, paragraph, and map) to your liking.
    - At a minimum, remove the inline style on the map div and add your own CSS to the style tag in the head of the document.
    - Make the map more prominent on the page by increasing its size and/or changing its position.

    AI use: you can ask questions of AI (such as "explain what this line of code does" or "how do I create a popup in Leaflet?") 
    But try and write the code yourself. 
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Map of Duluth</title>
    
    <!-- Leaflet CSS stylesheet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>

        /* full page leaflet map */
        body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f0f4f8;
}

.header {
    background-color: #003366;
    color: white;
    padding: 15px;
    text-align: center;
}

.description {
    padding: 10px 20px;
    font-size: 16px;
}

#map {
    height: 600px;   /* bigger map */
    width: 90%;
    margin: 20px auto;
    border: 4px solid black;
}
        
    </style>
</head>
<body>
    <!-- Header at the top of the page -->
    <div class="header">
        <h1>A Web Map of Duluth</h1>
        <h3>by: Conor Hurley</h3>
    </div>
    
    <!--Added a description-->
    <p class="description">
    This map highlights some of my favorite places around Duluth, including scenic viewpoints,
    outdoor recreation spots, and popular local attractions.
    </p>
    
    <div id="map"></div>
    
    <!-- Leaflet JavaScript library -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Initialize the map, center it on UMD campus, and set the zoom level, moved this point to downtown duluth
        const map = L.map('map').setView([46.7867, -92.1005], 12);

        // Add Esri Satellite tiles, changed it to EsriWorldImagery
        const tiles = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
        });
        // add tiles to the map
        tiles.addTo(map);

        // add marker at Hartley Nature Center
        const hartleyMarker = L.marker([46.835, -92.089]).addTo(map);
        hartleyMarker.bindPopup("<b>Hartley Nature Center</b><br>A great place to hike and see wildlife!").openPopup();


        // Add a marker for the UMD campus
        const marker = L.marker([46.82, -92.085],).addTo(map);
        marker.bindPopup("<b>University of Minnesota Duluth</b><br>A great place to learn about GIS!").openPopup();

        // added a marker for canal park
        const Marker = L.marker([46.779, -92.093]).addTo(map);
        Marker.bindPopup("<b>Canal Park</b><br>Famous for the Aerial Lift Bridge!");


        // Added a marker for Enger Tower
        const EngerMarker = L.marker([46.805, -92.115]).addTo(map);

         EngerMarker.bindPopup(`
         <b>Enger Tower</b><br>
         A historic stone tower with amazing panoramic views of Duluth and Lake Superior!<br><br>
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Enger_Tower.jpg" width="200">`);
    </script>
</body>
</html>
